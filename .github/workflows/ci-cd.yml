# CI/CD Pipeline for APK Scanner.
# Runs unit tests and builds Sphinx docs on PRs and pushes.
# Automatically deploys the documentation to GitHub Pages on master/main pushes.

name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test-and-build:
    name: Run Tests and Build Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Dependencies
        run: |
          uv sync

      - name: Run Pytest Test Suite
        run: |
          uv run pytest

      - name: Build Sphinx Documentation
        run: |
          uv run sphinx-build -b html docs/source docs/build/html

      - name: Bypass Jekyll processing
        run: touch docs/build/html/.nojekyll

      # Upload the compiled documentation as a temporary build artifact
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy-docs:
    name: Deploy Docs to GitHub Pages
    needs: test-and-build
    # Only run on pushes to main (not on pull requests)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
